name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create application.yml
        run: |
          mkdir -p ./routee-app/src/main/resources
          cat << 'EOF' > ./routee-app/src/main/resources/application.yml
          ${{ secrets.APPLICATION_YML }}
          EOF

      - name: Build and Test
        run: |
          chmod +x gradlew
          ./gradlew build
