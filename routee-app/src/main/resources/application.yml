spring:
  application:
    name: routee

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

oidc:
  properties:
    apple:
      jwk-set-uri: https://appleid.apple.com/auth/keys
      issuer: https://appleid.apple.com
      client-id: ${APPLE_CLIENT_ID:com.Routee-iOS}

jwt:
  secret: ${JWT_SECRET}
  issuer: org.routee
  access-token-expiry-ms: 14400000    # 4시간
  refresh-token-expiry-ms: 2592000000    # 30일
