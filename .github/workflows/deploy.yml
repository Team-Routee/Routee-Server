name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create application.yml
        run: |
          mkdir -p ./routee-app/src/main/resources
          cat << 'EOF' > ./routee-app/src/main/resources/application.yml
          ${{ secrets.APPLICATION_YML }}
          EOF

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :routee-app:build

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/routee-api:${{ github.sha }} \
                       -t ${{ secrets.DOCKER_USERNAME }}/routee-api:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/routee-api:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/routee-api:latest

      - name: Copy config files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/default.conf,scripts/"
          target: "~/app"
          overwrite: true

      - name: Blue-Green Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            chmod +x ~/app/scripts/deploy.sh

            export DOZZLE_USERNAME="${{ secrets.DOZZLE_USERNAME }}"
            export DOZZLE_PASSWORD="${{ secrets.DOZZLE_PASSWORD }}"
            export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"

            cd ~/app && bash scripts/deploy.sh ${{ secrets.DOCKER_USERNAME }}/routee-api:latest
